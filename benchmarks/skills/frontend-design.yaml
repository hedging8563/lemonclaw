skill: frontend-design
cases:
  - name: landing-page
    message: Design a landing page for a new AI project manager.
    prompt_must_contain:
      - Pick a strong visual direction.
  - name: dashboard
    message: Create a dashboard for monitoring shipments and alerts.
    prompt_must_contain:
      - Commit to a specific aesthetic
  - name: react-component
    message: 帮我做一个react组件，用来展示定价卡片。
    prompt_must_contain:
      - visual direction
  - name: chinese-poster
    message: 帮我做海报，宣传读书会活动。
    prompt_must_contain:
      - one memorable motion idea
  - name: negative-weather
    message: What's the weather in Shanghai today?
    expect_triggered: false
