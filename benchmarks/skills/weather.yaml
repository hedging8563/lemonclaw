skill: weather
cases:
  - name: current-weather
    message: What's the weather in San Francisco today?
    prompt_must_contain:
      - This is a `tool-wrapper` skill.
  - name: forecast
    message: Give me a forecast for London tomorrow and tell me if I need an umbrella.
    prompt_must_contain:
      - Use `wttr.in` first
  - name: json-fallback
    message: I need a programmatic weather check for Tokyo.
    prompt_must_contain:
      - Use Open-Meteo when JSON output
  - name: negative-reminder
    message: Remind me to stretch every 20 minutes.
    expect_triggered: false
