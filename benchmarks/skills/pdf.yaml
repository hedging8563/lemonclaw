skill: pdf
cases:
  - name: merge-pdfs
    message: Merge these two PDFs into one file.
    prompt_must_contain:
      - This is a `tool-wrapper` skill.
  - name: ocr-scanned
    message: OCR this scanned PDF and extract the text.
    prompt_must_contain:
      - For OCR, convert pages to images first.
  - name: create-pdf
    message: Create a PDF report from these bullet points.
    prompt_must_contain:
      - reportlab
  - name: negative-image
    message: Rotate this JPG image.
    expect_triggered: false
