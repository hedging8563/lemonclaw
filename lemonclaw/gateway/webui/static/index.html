<style>
/* ── Reset + Base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0D0D0D;
  --bg-secondary: #1A1A1A;
  --bg-tertiary: #252525;
  --bg-hover: #2F2F2F;
  --text-primary: #E8E8E8;
  --text-secondary: #999;
  --text-muted: #666;
  --accent: #FF6B35;
  --accent-hover: #FF8A5C;
  --teal: #0ABAB5;
  --teal-dim: rgba(10, 186, 181, 0.15);
  --border: #333;
  --error: #FF4444;
  --success: #4CAF50;
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --sidebar-w: 260px;
  --topbar-h: 48px;
}
html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-ui); font-size: 14px; line-height: 1.6; }
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input { font-family: inherit; font-size: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Login ────────────────────────────────────────────────────────── */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
.login-logo { font-family: var(--font-mono); font-size: 28px; font-weight: 600; color: var(--accent); }
.login-logo span { color: var(--teal); }
.login-subtitle { color: var(--text-secondary); font-size: 13px; margin-top: -16px; }
.login-form { display: flex; gap: 8px; }
.login-input { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; color: var(--text-primary); width: 300px; outline: none; font-family: var(--font-mono); font-size: 13px; }
.login-input:focus { border-color: var(--accent); }
.login-input::placeholder { color: var(--text-muted); }
.login-btn { background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: 500; transition: background 0.2s; }
.login-btn:hover { background: var(--accent-hover); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { color: var(--error); font-size: 13px; }
.login-noauth { color: var(--text-secondary); font-size: 12px; font-family: var(--font-mono); }

/* ── Layout ───────────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; }
.sidebar { width: var(--sidebar-w); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-brand { font-family: var(--font-mono); font-weight: 600; font-size: 15px; color: var(--accent); }
.sidebar-brand span { color: var(--teal); }
.sidebar-new { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--text-secondary); transition: all 0.2s; font-family: var(--font-mono); }
.sidebar-new:hover { border-color: var(--accent); color: var(--text-primary); }
.sidebar-section-label { padding: 12px 16px 4px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
.sidebar-sessions { flex: 1; overflow-y: auto; padding: 4px 8px; }
.sidebar-session { display: flex; align-items: flex-start; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; gap: 8px; border: 1px solid transparent; margin-bottom: 4px; }
.sidebar-session:hover { background: var(--bg-hover); border-color: var(--border); }
.sidebar-session.active { background: var(--bg-tertiary); border-color: var(--border); border-left: 2px solid var(--accent); }
.sidebar-session-info { flex: 1; min-width: 0; }
.sidebar-session-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; line-height: 1.3; }
.sidebar-session-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.sidebar-session-dot { color: var(--success); font-size: 8px; }
.sidebar-session-del { opacity: 0; color: var(--text-muted); font-size: 14px; padding: 2px 4px; transition: opacity 0.15s; flex-shrink: 0; margin-top: 1px; font-family: var(--font-mono); }
.sidebar-session:hover .sidebar-session-del { opacity: 1; }
.sidebar-session-del:hover { color: var(--error); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-family: var(--font-mono); }
.sidebar-stats { display: flex; gap: 4px; font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.sidebar-stats-key { color: var(--text-muted); }
.sidebar-stats-val { color: var(--teal); }
.sidebar-stats-sep { color: var(--text-muted); }
.sidebar-footer-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); }

/* ── Main area ────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: var(--topbar-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
.topbar-model { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: var(--font-mono); font-size: 12px; color: var(--teal); cursor: pointer; }
.topbar-model:hover { border-color: var(--teal); }
.topbar-status { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.topbar-spacer { flex: 1; }
.topbar-btn { padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--text-secondary); transition: all 0.15s; }
.topbar-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

/* ── Model selector dropdown ──────────────────────────────────────── */
.model-dropdown { position: absolute; top: calc(var(--topbar-h) + 4px); left: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 4px; z-index: 100; min-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.model-tier { padding: 6px 10px 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-family: var(--font-mono); }
.model-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
.model-item:hover { background: var(--bg-hover); }
.model-item.active { background: var(--teal-dim); }
.model-item-name { font-family: var(--font-mono); font-size: 12px; }
.model-item-desc { font-size: 11px; color: var(--text-muted); margin-left: auto; }

/* ── Chat area ────────────────────────────────────────────────────── */
.chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
.chat-empty-icon { font-size: 48px; opacity: 0.3; }
.chat-empty-text { font-size: 15px; }
.chat-empty-hint { font-size: 12px; font-family: var(--font-mono); }

/* ── Messages ─────────────────────────────────────────────────────── */
.msg { display: flex; gap: 12px; max-width: 800px; width: 100%; margin: 0 auto; }
.msg-user { justify-content: flex-end; }
.msg-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
.msg-user .msg-avatar { background: var(--accent); color: #fff; }
.msg-assistant .msg-avatar { background: var(--teal); color: #fff; }
.msg-body { max-width: 680px; min-width: 0; }
.msg-user .msg-body { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px 12px 2px 12px; padding: 10px 14px; }
.msg-assistant .msg-body { background: var(--bg-secondary); border-radius: 12px 12px 12px 2px; padding: 10px 14px; }

/* ── Markdown content ─────────────────────────────────────────────── */
.msg-content { word-break: break-word; }
.msg-content p { margin: 0 0 8px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content pre { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.5; }
.msg-content code { font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-primary); padding: 2px 5px; border-radius: 3px; }
.msg-content pre code { background: none; padding: 0; }
.msg-content ul, .msg-content ol { margin: 4px 0; padding-left: 20px; }
.msg-content blockquote { border-left: 3px solid var(--teal); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
.msg-content table { border-collapse: collapse; margin: 8px 0; }
.msg-content th, .msg-content td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
.msg-content th { background: var(--bg-tertiary); }

/* ── Tool hint ────────────────────────────────────────────────────── */
.msg-tool-hint { font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); padding: 4px 0; display: flex; align-items: center; gap: 6px; }
.msg-tool-hint::before { content: '\2699'; font-size: 11px; }

/* ── Thinking block ──────────────────────────────────────────────── */
.msg-thinking { margin: 4px 0 8px; border-left: 2px solid var(--teal-dim, #0a8a86); border-radius: 4px; overflow: hidden; }
.msg-thinking-toggle { display: flex; align-items: center; gap: 6px; padding: 4px 8px; font-size: 12px; font-family: var(--font-mono); color: var(--text-muted); cursor: pointer; background: none; border: none; width: 100%; text-align: left; transition: color 0.15s; }
.msg-thinking-toggle:hover { color: var(--text-secondary); }
.msg-thinking-toggle .arrow { display: inline-block; transition: transform 0.15s; font-size: 10px; }
.msg-thinking-toggle .arrow.open { transform: rotate(90deg); }
.msg-thinking-body { padding: 6px 10px; font-size: 12px; line-height: 1.6; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; }
.msg-thinking-body::-webkit-scrollbar { width: 4px; }
.msg-thinking-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Tool detail card ────────────────────────────────────────────── */
.msg-tool-card { margin: 4px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; font-size: 12px; }
.msg-tool-card-header { display: flex; align-items: center; gap: 6px; padding: 5px 8px; font-family: var(--font-mono); color: var(--text-secondary); cursor: pointer; background: var(--bg-tertiary); border: none; width: 100%; text-align: left; transition: background 0.15s; }
.msg-tool-card-header:hover { background: var(--bg-hover, var(--bg-tertiary)); }
.msg-tool-card-header .arrow { display: inline-block; transition: transform 0.15s; font-size: 10px; color: var(--text-muted); }
.msg-tool-card-header .arrow.open { transform: rotate(90deg); }
.msg-tool-card-icon { font-size: 11px; }
.msg-tool-card-name { font-weight: 600; }
.msg-tool-card-status { margin-left: auto; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.msg-tool-card-status.running { color: var(--teal); }
.msg-tool-card-status.done { color: var(--text-muted); }
.msg-tool-card-status.error { color: var(--error, #e74c3c); }
.msg-tool-card-body { padding: 6px 10px; border-top: 1px solid var(--border); }
.msg-tool-card-section { margin: 2px 0; }
.msg-tool-card-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
.msg-tool-card-pre { background: var(--bg-primary); border-radius: 4px; padding: 4px 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; margin: 0; }
.msg-actions { display: flex; gap: 4px; margin-top: 4px; opacity: 0.8; }
.msg-action-btn { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.msg-action-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
.msg-edit-textarea { width: 100%; min-height: 60px; max-height: 200px; background: var(--bg-primary); border: 1px solid var(--teal); border-radius: 6px; padding: 8px 10px; color: var(--text-primary); font-size: 13px; font-family: inherit; resize: vertical; outline: none; }
.session-title-input { background: transparent; border: 1px solid var(--teal); border-radius: 4px; padding: 2px 6px; color: var(--text-primary); font-size: 13px; width: 100%; outline: none; font-family: inherit; }

/* ── Streaming cursor ─────────────────────────────────────────────── */
.streaming-cursor::after { content: '\2588'; animation: blink 0.8s infinite; color: var(--accent); }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ── Session system prompt bar ───────────────────────────────────── */
.session-sp-bar { border-bottom: 1px solid var(--border); padding: 0; }
.session-sp-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 24px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); cursor: pointer; background: none; border: none; width: 100%; text-align: left; }
.session-sp-toggle:hover { color: var(--text-secondary); }
.session-sp-toggle .arrow { display: inline-block; transition: transform 0.15s; font-size: 9px; }
.session-sp-toggle .arrow.open { transform: rotate(90deg); }
.session-sp-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); display: inline-block; }
.session-sp-body { padding: 4px 24px 8px; }
.session-sp-textarea { width: 100%; min-height: 48px; max-height: 120px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 12px; font-family: inherit; resize: vertical; outline: none; }
.session-sp-textarea:focus { border-color: var(--teal); }
.session-sp-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 4px; }
.session-sp-btn { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 10px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); cursor: pointer; }
.session-sp-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
.session-sp-btn.save { color: var(--teal); border-color: var(--teal); }
.session-sp-btn.save:hover { background: var(--teal); color: #fff; }

/* ── Input area ───────────────────────────────────────────────────── */
.input-area { border-top: 1px solid var(--border); padding: 16px 24px; background: var(--bg-primary); }
.input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
.input-field { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-family: var(--font-ui); font-size: 14px; resize: none; outline: none; max-height: 160px; min-height: 42px; line-height: 1.5; }
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text-muted); }
.input-send { background: var(--accent); color: #fff; width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: background 0.2s; flex-shrink: 0; }
.input-send:hover { background: var(--accent-hover); }
.input-send:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Activity Feed ────────────────────────────────────────────────── */
.activity-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
.activity-header { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 8px 0; display: flex; align-items: center; justify-content: space-between; max-width: 800px; width: 100%; margin: 0 auto; }
.activity-search { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-primary); outline: none; width: 180px; }
.activity-search:focus { border-color: var(--teal); }
.activity-search::placeholder { color: var(--text-muted); }
.activity-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
.activity-empty-icon { font-size: 48px; opacity: 0.3; }
.activity-empty-text { font-size: 15px; }
.activity-empty-hint { font-size: 12px; font-family: var(--font-mono); }

.activity-event { display: flex; gap: 10px; max-width: 800px; width: 100%; margin: 0 auto; padding: 8px 12px; border-radius: 8px; border-left: 3px solid transparent; }
.activity-event-user { background: var(--bg-tertiary); border-left-color: var(--accent); }
.activity-event-assistant { background: var(--bg-secondary); border-left-color: var(--teal); }
.activity-event-tool { background: var(--bg-primary); border: 1px solid var(--border); border-left: 3px solid var(--teal-dim); }
.activity-event-progress { background: transparent; border-left-color: var(--border); opacity: 0.7; }
.activity-event-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); flex-shrink: 0; min-width: 42px; padding-top: 1px; }
.activity-event-body { flex: 1; min-width: 0; }
.activity-event-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.activity-event-role { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.activity-event-user .activity-event-role { color: var(--accent); }
.activity-event-assistant .activity-event-role { color: var(--teal); }
.activity-event-tool .activity-event-role { color: var(--teal); opacity: 0.7; }
.activity-event-channel { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); }
.activity-event-content { font-size: 13px; word-break: break-word; line-height: 1.5; }
.activity-event-tool .activity-event-content { font-family: var(--font-mono); font-size: 12px; color: var(--teal); }
.activity-event-content p { margin: 0 0 4px; }
.activity-event-content p:last-child { margin-bottom: 0; }

.activity-streaming { font-family: var(--font-mono); font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; padding: 4px 0; max-width: 800px; margin: 0 auto; width: 100%; }
.activity-streaming::before { content: '\25CF'; margin-right: 6px; animation: blink 0.8s infinite; }

/* ── Conductor panel ─────────────────────────────────────────────── */
.conductor-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.conductor-header { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); padding: 8px 0; max-width: 800px; width: 100%; margin: 0 auto; }
.conductor-section { max-width: 800px; width: 100%; margin: 0 auto; }
.conductor-section-title { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.conductor-agent { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
.conductor-agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conductor-agent-dot.idle { background: var(--text-muted); }
.conductor-agent-dot.busy { background: var(--teal); animation: blink 0.8s infinite; }
.conductor-agent-dot.error { background: var(--error); }
.conductor-agent-info { flex: 1; min-width: 0; }
.conductor-agent-name { font-size: 13px; font-weight: 500; }
.conductor-agent-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.conductor-plan { padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.conductor-plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.conductor-plan-phase { font-family: var(--font-mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.conductor-plan-phase.analyzing { background: #FF6B3522; color: var(--accent); }
.conductor-plan-phase.splitting { background: #7289DA22; color: #7289DA; }

.conductor-progress-bar { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; }

.conductor-subtask.completed { border-left-color: var(--success); }
.conductor-subtask.running { border-left-color: var(--teal); }
.conductor-subtask.failed { border-left-color: var(--error); }
.conductor-subtask-status { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; min-width: 60px; }
.conductor-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
.conductor-empty-icon { font-size: 48px; opacity: 0.3; }

/* ── Sidebar tabs ────────────────────────────────────────────────── */
.sidebar-tabs { display: flex; border-top: 1px solid var(--border); }
.sidebar-tab { flex: 1; padding: 8px 0; text-align: center; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); transition: all 0.15s; border-top: 2px solid transparent; }
.sidebar-tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
.sidebar-tab.active { color: var(--accent); border-top-color: var(--accent); }
.activity-badge { display: inline-block; min-width: 16px; height: 16px; line-height: 16px; text-align: center; font-size: 9px; font-family: var(--font-mono); background: var(--accent); color: #fff; border-radius: 8px; margin-left: 4px; padding: 0 4px; vertical-align: middle; }

/* ── Activity session list ───────────────────────────────────────── */
.activity-session { display: flex; align-items: flex-start; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; gap: 8px; border: 1px solid transparent; margin-bottom: 4px; }
.activity-session:hover { background: var(--bg-hover); border-color: var(--border); }
.activity-session.active { background: var(--bg-tertiary); border-color: var(--border); border-left: 2px solid var(--teal); }
.activity-session-info { flex: 1; min-width: 0; }
.activity-session-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; line-height: 1.3; }
.activity-session-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.activity-session-channel { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--teal); flex-shrink: 0; }
.activity-event-channel { font-family: var(--font-mono); font-size: 10px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted); }
/* Channel-specific colors */
.ch-tg { color: #29B6F6; border-color: #29B6F633; }
.ch-dc { color: #7289DA; border-color: #7289DA33; }
.ch-wa { color: #25D366; border-color: #25D36633; }
.ch-sk { color: #E01E5A; border-color: #E01E5A33; }
.ch-fs { color: #3370FF; border-color: #3370FF33; }
.ch-dt { color: #0089FF; border-color: #0089FF33; }
.ch-wc { color: #07C160; border-color: #07C16033; }
.ch-qq { color: #12B7F5; border-color: #12B7F533; }
.ch-em { color: #EA4335; border-color: #EA433533; }
.ch-mx { color: #0DBD8B; border-color: #0DBD8B33; }

/* ── WS status ───────────────────────────────────────────────────── */
.ws-status { font-family: var(--font-mono); font-size: 10px; padding: 4px 12px; }
.ws-status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.ws-status-dot.connected { background: var(--success); }
.ws-status-dot.disconnected { background: var(--error); }

/* ── Mobile ───────────────────────────────────────────────────────── */
/* ── Copy button for code blocks ─────────────────────────────── */
.code-block-wrap { position: relative; }
.code-copy-btn { position: absolute; top: 6px; right: 6px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text-muted); cursor: pointer; opacity: 0; transition: opacity 0.15s; font-family: var(--font-mono); }
.code-block-wrap:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { color: var(--text-primary); border-color: var(--teal); }
.code-copy-btn.copied { color: var(--success); border-color: var(--success); }

/* ── Confirm dialog ──────────────────────────────────────────── */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: flex; align-items: center; justify-content: center; }
.confirm-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 24px; min-width: 280px; text-align: center; }
.confirm-msg { margin-bottom: 16px; font-size: 14px; }
.confirm-actions { display: flex; gap: 12px; justify-content: center; }
.confirm-cancel { padding: 8px 20px; border-radius: 6px; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); }
.confirm-cancel:hover { color: var(--text-primary); }
.confirm-delete { padding: 8px 20px; border-radius: 6px; background: var(--error); color: #fff; }
.confirm-delete:hover { opacity: 0.85; }

/* ── Mobile ───────────────────────────────────────────────────── */
.mobile-menu-btn { display: none; background: none; border: none; color: var(--text-primary); font-size: 22px; padding: 4px 8px; cursor: pointer; }
.sidebar-overlay { display: none; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; z-index: 200; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  .mobile-menu-btn { display: block; }
  .chat-area { padding: 16px; }
  .input-area { padding: 12px 16px; }

/* ── Light theme ────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg-primary: #FAFAFA;
  --bg-secondary: #FFFFFF;
  --bg-tertiary: #F0F0F0;
  --bg-hover: #E8E8E8;
  --text-primary: #1A1A1A;
  --text-secondary: #666;
  --text-muted: #999;
  --border: #E0E0E0;
}
[data-theme="light"] .msg-content pre { background: #F5F5F5; border-color: #E0E0E0; }
[data-theme="light"] .msg-content code { background: #F0F0F0; }
[data-theme="light"] .sidebar-overlay.open { background: rgba(0,0,0,0.2); }

.settings-label { font-size: 13px; color: var(--text-primary); min-width: 120px; }
.settings-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.settings-select:focus { border-color: var(--accent); }
.settings-input { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; outline: none; width: 120px; }
.settings-input:focus { border-color: var(--accent); }
.settings-textarea { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; outline: none; width: 100%; min-height: 80px; resize: vertical; }
.settings-textarea:focus { border-color: var(--accent); }
.settings-toggle { position: relative; width: 36px; height: 20px; background: var(--bg-hover); border-radius: 10px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.settings-toggle.on { background: var(--teal); }
.settings-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.settings-toggle.on::after { transform: translateX(16px); }

.settings-btn-primary { background: var(--accent); color: #fff; }
.settings-btn-primary:hover { background: var(--accent-hover); }
.settings-btn-secondary { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary); }

function getLang() {
  const saved = localStorage.getItem('lc_lang');
  if (saved && I18N[saved]) return saved;
  return navigator.language.startsWith('zh') ? 'zh' : 'en';
}

let _lang = getLang();
function t(key) { return (I18N[_lang] && I18N[_lang][key]) || key; }
function updateHtmlLang() { const el = document.getElementById('html-root'); if (el) el.lang = _lang === 'zh' ? 'zh-CN' : 'en'; }
updateHtmlLang();

// ── Theme init ───────────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('lc_theme') || 'dark';
  const root = document.documentElement;
  if (saved === 'system') {
    root.setAttribute('data-theme', window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  } else {
    root.setAttribute('data-theme', saved);
  }
  const fs = localStorage.getItem('lc_font_size');
  if (fs) document.body.style.fontSize = { sm: '13px', md: '14px', lg: '15px' }[fs] || '14px';
})();

let _msgIdCounter = 0;
function nextMsgId() { return 'msg-' + (++_msgIdCounter); }

function renderMd(text) {
  if (!text) return '';
  const raw = marked.parse(text);
  return DOMPurify.sanitize(raw);
}

async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: 'same-origin', ...opts });
  return res;
}

function LoginScreen({ onLogin }) {
  const [token, setToken] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [noAuth, setNoAuth] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    // Read token from URL ?token= param or localStorage.
    const urlToken = new URLSearchParams(location.search).get('token');
    const saved = urlToken || localStorage.getItem('lc_token');
    if (saved) setToken(saved);
    // Clean token from URL to avoid leaking in referrer/history.
    if (urlToken) history.replaceState(null, '', location.pathname);
    // Probe auth state via dedicated check endpoint
    api('/api/auth/check').then(r => {
      if (r.ok) { return r.json(); }
      return null;
    }).then(data => {
      if (data && data.ok) {
        if (!data.auth_required) { setNoAuth(true); }
        onLogin();
      } else if (saved) {
        // Auto-login with saved/URL token — use value directly since setState is async.
        api('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: saved }),
        }).then(r => {
          if (r.ok) { localStorage.setItem('lc_token', saved); onLogin(); }
        }).catch(() => {});
      }
    }).catch(() => {});
    inputRef.current?.focus();
  }, []);

  const submit = async (e) => {
    e?.preventDefault();
    if (noAuth) { onLogin(); return; }
    setLoading(true); setError('');
    try {
      const r = await api('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      if (r.ok) { localStorage.setItem('lc_token', token); onLogin(); }
      else { setError(t('login_error')); }
    } catch (_) { setError(t('error')); }
    setLoading(false);
  };

  return html`
    <div class="login-screen">
      <div class="login-logo">Lemon<span>Claw</span></div>
      <div class="login-subtitle">${t('login_subtitle')}</div>
      ${noAuth
        ? html`<div class="login-noauth">${t('login_noauth')}</div>`
        : html`
          <form class="login-form" onSubmit=${submit}>
            <input ref=${inputRef} class="login-input" type="password"
              placeholder=${t('login_placeholder')} value=${token}
              onInput=${e => setToken(e.target.value)} />
            <button class="login-btn" type="submit" disabled=${loading || !token}>
              ${t('login_btn')}
            </button>
          </form>
          ${error && html`<div class="login-error">${error}</div>`}
        `
      }
    </div>
  `;
}

function ModelDropdown({ models, current, onSelect, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener('click', handler, true);
    return () => document.removeEventListener('click', handler, true);
  }, []);

  const tiers = {};
  models.forEach(m => { (tiers[m.tier] = tiers[m.tier] || []).push(m); });

  return html`
    <div class="model-dropdown" ref=${ref}>
      ${Object.entries(tiers).map(([tier, items]) => html`
        <div class="model-tier">// ${tier}</div>
        ${items.map(m => html`
          <div class="model-item ${m.id === current ? 'active' : ''}" tabindex="0" onClick=${() => { onSelect(m.id); onClose(); }} onKeyDown=${(e) => { if (e.key === 'Enter') { onSelect(m.id); onClose(); } }}>
            <span class="model-item-name">${m.id}</span>
            <span class="model-item-desc">${m.description}</span>
          </div>
        `)}
      `)}
    </div>
  `;
}

// 6.3: Per-session system prompt editor bar
function SessionSystemPromptBar({ value, sessionKey, onSave }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(value || '');
  const [saved, setSaved] = useState(false);

  useEffect(() => { setDraft(value || ''); setSaved(false); }, [value, sessionKey]);

  const handleSave = async (text) => {
    const val = text != null ? text : draft;
    try {
      await fetch('/api/sessions/' + encodeURIComponent(sessionKey), {
        method: 'PATCH', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system_prompt_override: val }),
      });
      if (onSave) onSave(val);
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (_) {}
  };

  const hasValue = !!(value || '').trim();
  return html`
    <div class="session-sp-bar">
      <button class="session-sp-toggle" onClick=${() => setOpen(!open)}>
        <span class="arrow ${open ? 'open' : ''}">▶</span>
        <span>// ${t('settings_system_prompt')}</span>
        ${hasValue && !open ? html`<span class="dot" />` : ''}
      </button>
      ${open && html`
        <div class="session-sp-body">
          <textarea class="session-sp-textarea" value=${draft}
            onInput=${e => setDraft(e.target.value)}
            placeholder=${t('settings_system_prompt') + '...'} />
          <div class="session-sp-actions">
            ${saved ? html`<span style="font-size:11px;color:var(--teal)">✓</span>` : ''}
            <button class="session-sp-btn" onClick=${() => { setDraft(''); handleSave(''); }}>Clear</button>
            <button class="session-sp-btn save" onClick=${() => handleSave(draft)}>Save</button>
          </div>
        </div>
      `}
    </div>
  `;
}

function Message({ role, content, toolHints, thinkingBlocks, toolDetails, streaming, isLast, onCopy, onRegenerate, onEdit, showThinking, showTools }) {
  const bodyRef = useRef(null);
  const [hovered, setHovered] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState('');
  const [copyLabel, setCopyLabel] = useState(null);

  useEffect(() => {
    if (bodyRef.current) {
      bodyRef.current.querySelectorAll('pre code:not(.hljs)').forEach(el => {
        hljs.highlightElement(el);
      });
      // Inject copy buttons into code blocks (safe, no onclick in HTML)
      bodyRef.current.querySelectorAll('pre').forEach(pre => {
        if (pre.parentElement.classList.contains('code-block-wrap')) return;
        const wrap = document.createElement('div');
        wrap.className = 'code-block-wrap';
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(pre);
        const btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(pre.textContent).then(() => {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
          });
        });
        wrap.insertBefore(btn, pre);
      });
    }
  }, [content]);

  if (role === 'user') {
    if (editing) {
      return html`
        <div class="msg msg-user">
          <div class="msg-body" style="width:100%">
            <textarea class="msg-edit-textarea" value=${editText}
              onInput=${e => setEditText(e.target.value)}
              placeholder=${t('msg_edit_placeholder')} />
            <div class="msg-actions" style="justify-content:flex-end;opacity:1">
              <button class="msg-action-btn" onClick=${() => setEditing(false)}>${t('msg_edit_cancel')}</button>
              <button class="msg-action-btn" style="color:var(--teal)" onClick=${() => {
                if (editText.trim() && onEdit) { onEdit(editText.trim()); setEditing(false); }
              }}>${t('msg_edit_send')}</button>
            </div>
          </div>
          <div class="msg-avatar">U</div>
        </div>
      `;
    }
    return html`
      <div class="msg msg-user" onMouseEnter=${() => setHovered(true)} onMouseLeave=${() => setHovered(false)}>
        <div class="msg-body">
          <div class="msg-content" dangerouslySetInnerHTML=${{ __html: renderMd(content) }} />
          ${hovered && !streaming ? html`
            <div class="msg-actions">
              <button class="msg-action-btn" onClick=${() => {
                navigator.clipboard.writeText(content);
                setCopyLabel(t('msg_copied'));
                setTimeout(() => setCopyLabel(null), 1200);
              }}>${copyLabel || t('msg_copy')}</button>
              ${onEdit ? html`<button class="msg-action-btn" onClick=${() => { setEditText(content); setEditing(true); }}>${t('msg_edit')}</button>` : ''}
            </div>
          ` : ''}
        </div>
        <div class="msg-avatar">U</div>
      </div>
    `;
  }

  return html`
    <div class="msg msg-assistant" onMouseEnter=${() => setHovered(true)} onMouseLeave=${() => setHovered(false)}>
      <div class="msg-avatar">A</div>
      <div class="msg-body">
        ${showThinking && thinkingBlocks && thinkingBlocks.map((tb, i) => html`<${ThinkingBlock} key=${i} content=${tb} />`)}
        ${showTools && toolDetails && toolDetails.length > 0
          ? toolDetails.map((td, i) => html`<${ToolDetailCard} key=${i} detail=${td} />`)
          : toolHints && toolHints.map(hint => html`<div class="msg-tool-hint">${hint}</div>`)
        }
        <div ref=${bodyRef} class="msg-content ${streaming ? 'streaming-cursor' : ''}"
          dangerouslySetInnerHTML=${{ __html: renderMd(content) }} />
        ${hovered && !streaming ? html`
          <div class="msg-actions">
            <button class="msg-action-btn" onClick=${() => {
              navigator.clipboard.writeText(content);
              setCopyLabel(t('msg_copied'));
              setTimeout(() => setCopyLabel(null), 1200);
            }}>${copyLabel || t('msg_copy')}</button>
            ${isLast && onRegenerate ? html`<button class="msg-action-btn" onClick=${onRegenerate}>${t('msg_regenerate')}</button>` : ''}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function InputArea({ onSend, disabled }) {
  const [text, setText] = useState('');
  const ref = useRef(null);

  const submit = () => {
    const msg = text.trim();
    if (!msg || disabled) return;
    onSend(msg);
    setText('');
    if (ref.current) ref.current.style.height = 'auto';

  const onKeyDown = (e) => {

    setText(e.target.value);
    const el = e.target;
    el.style.height = 'auto';

  };

  return html`
    <div class="input-area">

        <textarea ref=${ref} class="input-field" rows="1"

          value=${text} onInput=${onInput} onKeyDown=${onKeyDown}

        <button class="input-send" onClick=${submit} disabled=${disabled || !text.trim()}>

        </button>
      </div>
    </div>
  `;
}


// ── SSE Stream Reader ───────────────────────────────────────────────────

async function streamChat(message, sessionKey, model, onEvent) {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const res = await fetch('/api/chat/stream', {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, session_key: sessionKey, model, timezone: tz }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Request failed' }));
    onEvent({ type: 'error', data: err.error || 'HTTP ' + res.status });
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    let done, value;
    try {
      ({ done, value } = await reader.read());
    } catch (e) {
      onEvent({ type: 'error', data: 'Connection lost. Please retry.' });
      return;
    }
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const event = JSON.parse(line.slice(6));
        onEvent(event);
      } catch (_) {
        // Skip malformed SSE lines
      }
    }
  }

  // Process remaining buffer
  if (buffer.startsWith('data: ')) {
    try {
      const event = JSON.parse(buffer.slice(6));
      onEvent(event);
    } catch (_) {}
  }
}

const CHANNEL_ABBR = { telegram: 'TG', discord: 'DC', whatsapp: 'WA', feishu: 'FS', dingtalk: 'DT', email: 'EM', wecom: 'WC', qq: 'QQ', matrix: 'MX', mochat: 'MC', slack: 'SK', webui: 'WEB' };
const CHANNEL_CSS = { telegram: 'ch-tg', discord: 'ch-dc', whatsapp: 'ch-wa', feishu: 'ch-fs', dingtalk: 'ch-dt', email: 'ch-em', wecom: 'ch-wc', qq: 'ch-qq', matrix: 'ch-mx', slack: 'ch-sk' };
function channelAbbr(ch) { return CHANNEL_ABBR[ch] || ch.toUpperCase().slice(0, 2); }
function channelClass(ch) { return CHANNEL_CSS[ch] || ''; }

// ── Activity WebSocket hook ──────────────────────────────────────────────
function useActivityWS(active) {
  const [connected, setConnected] = useState(false);
  const [events, setEvents] = useState([]);
  const [unreadCount, setUnreadCount] = useState(0);
  const wsRef = useRef(null);
  const reconnectRef = useRef(null);
  const onNewEventRef = useRef(null);

  useEffect(() => {
    if (!active) {
      if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
      if (reconnectRef.current) { clearTimeout(reconnectRef.current); reconnectRef.current = null; }
      setConnected(false);
      return;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws/activity`);
      wsRef.current = ws;

      ws.onopen = () => { setConnected(true); };
      ws.onclose = () => {
        setConnected(false);
        wsRef.current = null;
        reconnectRef.current = setTimeout(connect, 3000);
      };
      ws.onmessage = (e) => {
        try {
          const evt = JSON.parse(e.data);
          if (evt.type === 'ping') return;

          setEvents(prev => {
            // Merge chunks: append content to existing streaming entry
            if (evt.type === 'chunk') {
              const last = prev.length > 0 ? prev[prev.length - 1] : null;
              if (last && last._streaming && last.session_key === evt.session_key) {
                const merged = [...prev];
                merged[merged.length - 1] = { ...last, content: (last.content || '') + (evt.content || ''), timestamp: evt.timestamp };
                return merged;
              }
              // First chunk — create a streaming entry
              const next = [...prev, { ...evt, type: 'assistant', role: 'assistant', _streaming: true }];
              return next.length > 500 ? next.slice(-300) : next;
            }

            // Done: replace the streaming entry with final content
            if (evt.type === 'done') {
              const merged = [...prev];
              for (let i = merged.length - 1; i >= 0; i--) {
                if (merged[i]._streaming && merged[i].session_key === evt.session_key) {
                  merged[i] = { ...merged[i], content: evt.content || merged[i].content, _streaming: false };
                  return merged;
                }
              }
              // No streaming entry found — just append done as message
              return [...prev, { ...evt, type: 'message' }];
            }

            const next = [...prev, evt];
            return next.length > 500 ? next.slice(-300) : next;
          });

          // Increment unread count for new user/assistant messages
          if (evt.type === 'message' || evt.role === 'user') {
            setUnreadCount(c => c + 1);
          }

          // Notify parent for session list refresh on new user messages
          if (evt.role === 'user' && onNewEventRef.current) {
            onNewEventRef.current();
          }
        } catch (_) {}
      };
    }

    connect();
    return () => {
      if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
      if (reconnectRef.current) { clearTimeout(reconnectRef.current); reconnectRef.current = null; }
    };
  }, [active]);

  return {
    connected, events,
    unreadCount, clearUnread: () => setUnreadCount(0),
    clearEvents: () => setEvents([]),
    onNewEventRef,
  };
}

// ── Activity Panel ───────────────────────────────────────────────────────
function ActivityPanel({ connected, events, activitySessions, selectedSession, onSelectSession }) {
  const endRef = useRef(null);
  const areaRef = useRef(null);
  const [autoScroll, setAutoScroll] = useState(true);
  const [searchQuery, setSearchQuery] = useState('');

  // Track scroll position to decide auto-scroll
  useEffect(() => {
    const el = areaRef.current;
    if (!el) return;
    const onScroll = () => {
      const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
      setAutoScroll(atBottom);
    };
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    if (autoScroll) endRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [events]);

  // Filter events by selected session and search query
  let filtered = selectedSession
    ? events.filter(e => e.session_key === selectedSession)
    : events;

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(e => (e.content || '').toLowerCase().includes(q));
  }

  // Detect streaming state from merged entries
  const isStreaming = filtered.some(e => e._streaming);

  if (filtered.length === 0) {
    return html`
      <div class="activity-area">
        <div class="activity-empty">
          <div class="activity-empty-icon">\uD83D\uDCE1</div>
          <div class="activity-empty-text">${t('activity_empty')}</div>
          <div class="activity-empty-hint">${t('activity_hint')}</div>
        </div>
      </div>
    `;
  }

  return html`
    <div class="activity-area" ref=${areaRef}>
      <div class="activity-header">
        // activity ${selectedSession ? '\u00B7 ' + selectedSession.split(':')[0].toUpperCase() : ''}
        <input class="activity-search" type="text" placeholder=${t('activity_search')}
          value=${searchQuery} onInput=${(e) => setSearchQuery(e.target.value)} />
      </div>
      ${filtered.map((evt, i) => html`
        <${ActivityEvent} key=${i} evt=${evt} showChannel=${!selectedSession} />
      `)}
      ${isStreaming ? html`<div class="activity-streaming">STREAMING</div>` : ''}
      <div ref=${endRef} />
    </div>
  `;
}

            ${aboutInfo.total_tokens != null ? html`
              <div class="settings-row">
                <div class="settings-label">${t('settings_total_tokens')}</div>
                <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">${aboutInfo.total_tokens?.toLocaleString() || '0'}</span>
              </div>
            ` : ''}
            ${aboutInfo.llm_calls != null ? html`
              <div class="settings-row">
                <div class="settings-label">${t('settings_llm_calls')}</div>
                <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">${aboutInfo.llm_calls || 0}</span>
              </div>
            ` : ''}
          ` : html`<div class="settings-status">Loading...</div>`}
        ` : html`
          <div class="settings-subtitle">// ${t('settings_' + subTab)}</div>
          <div class="settings-status" style="color:var(--text-muted)">Coming in next update...</div>
        `}
      </div>
    </div>
  `;
}

// ── App ─────────────────────────────────────────────────────────────────

function App() {
  const [authed, setAuthed] = useState(false);
  const [lang, setLang] = useState(_lang);
  const [sessions, setSessions] = useState([]);
  const [activeKey, setActiveKey] = useState('webui:default');
  const [messages, setMessages] = useState([]);
  const [streaming, setStreaming] = useState(false);
  const [models, setModels] = useState([]);
  const [currentModel, setCurrentModel] = useState('');
  const [sessionUsage, setSessionUsage] = useState(null);
  const [sessionSystemPrompt, setSessionSystemPrompt] = useState('');
  const [appVersion, setAppVersion] = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [connectionOk, setConnectionOk] = useState(true);
  const [activeTab, setActiveTab] = useState('chat');
  const [activitySessions, setActivitySessions] = useState([]);
  const [selectedActivitySession, setSelectedActivitySession] = useState(null);
  const [conductorAgents, setConductorAgents] = useState([]);
  const [conductorPlans, setConductorPlans] = useState([]);

  const { connected: wsConnected, events: wsEvents, unreadCount, clearUnread, onNewEventRef } = useActivityWS(authed);

  // Auto-refresh activity sessions when new IM messages arrive
  useEffect(() => {
    onNewEventRef.current = () => { loadActivitySessions(); };
    return () => { onNewEventRef.current = null; };
  }, [loadActivitySessions]);

  // Clear unread when switching to activity tab
  useEffect(() => {
    if (activeTab === 'activity') clearUnread();
  }, [activeTab]);

  const toggleLang = useCallback(() => {
    const next = _lang === 'en' ? 'zh' : 'en';
    _lang = next;
    localStorage.setItem('lc_lang', next);
    updateHtmlLang();
    setLang(next);
  }, []);

  const loadSessions = useCallback(async () => {
    try {
      const r = await api('/api/sessions');
      if (r.ok) {
        const d = await r.json();
        setSessions(d.sessions || []);
        setConnectionOk(true);
      }
    } catch (_) { setConnectionOk(false); }
  }, []);

  const loadModels = useCallback(async () => {
    try {
      const r = await api('/api/models');
      if (r.ok) {
        const d = await r.json();
        const list = d.models || [];
        setModels(list);
        // 5.1: Use server-reported current model (global default), no localStorage
        setCurrentModel(d.current || '');
      }
    } catch (_) {}
  }, []);

  const loadInfo = useCallback(async (sessionKey) => {
    try {
      const url = sessionKey ? '/api/info?session=' + encodeURIComponent(sessionKey) : '/api/info';
      const r = await api(url);
      if (r.ok) {
        const d = await r.json();
        if (d.version) setAppVersion(d.version);
        setSessionUsage(d.session_usage || null);
      }
    } catch (_) {}
  }, []);

  const loadSessionMessages = useCallback(async (key) => {
    try {
      const r = await api('/api/sessions/' + encodeURIComponent(key) + '/messages');
      if (r.ok) {
        const d = await r.json();
        setMessages(d.messages || []);
        setSessionSystemPrompt(d.system_prompt_override || '');
      }
    } catch (_) { setMessages([]); setSessionSystemPrompt(''); }
  }, []);

  const loadActivitySessions = useCallback(async () => {
    try {
      const r = await api('/api/activity/sessions');
      if (r.ok) {
        const d = await r.json();
        setActivitySessions(d.sessions || []);
      }
    } catch (_) {}
  }, []);

  const loadConductor = useCallback(async () => {
    try {
      const [agentsRes, plansRes] = await Promise.all([
        api('/api/conductor/agents'),
        api('/api/conductor/plans'),
      ]);
      if (agentsRes.ok) { const d = await agentsRes.json(); setConductorAgents(d.agents || []); }
      if (plansRes.ok) { const d = await plansRes.json(); setConductorPlans(d.plans || []); }
    } catch (_) {}
  }, []);

  useEffect(() => {
    if (authed) {
      loadSessions();
      loadModels();
      loadInfo(activeKey);
      loadSessionMessages(activeKey);
    }
  }, [authed]);

  useEffect(() => {
    if (authed && activeTab === 'activity') {
      loadActivitySessions();
    }
    if (authed && activeTab === 'conductor') {
      loadConductor();
      // Auto-refresh every 5s while on conductor tab
      const iv = setInterval(loadConductor, 5000);
      return () => clearInterval(iv);
    }
  }, [authed, activeTab]);

  // 5.4: Keyboard shortcuts
  useEffect(() => {
    if (!authed) return;
    const handler = (e) => {
      const isInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT';
      // Ctrl+N / Cmd+N: new chat (skip if in input to allow browser default)
      if ((e.ctrlKey || e.metaKey) && e.key === 'n' && !isInput) {
        e.preventDefault(); newChat();
      }
      // Ctrl+K / Cmd+K: toggle sidebar (always, even in input — standard shortcut)
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault(); setSidebarOpen(s => !s);
      }
      // Ctrl+, / Cmd+,: open settings (skip if in input)
      if ((e.ctrlKey || e.metaKey) && e.key === ',' && !isInput) {
        e.preventDefault(); setActiveTab('settings');
      }
      // Escape: close sidebar (skip if in input)
      if (e.key === 'Escape' && !isInput) {
        if (sidebarOpen) setSidebarOpen(false);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [authed, streaming, sidebarOpen]);

  const sendMessage = useCallback(async (text) => {
    const sendKey = activeKey;  // Snapshot to avoid closure stale ref on session switch
    const userMsg = { role: 'user', content: text, id: nextMsgId() };
    const assistantMsg = { role: 'assistant', content: '', toolHints: [], thinkingBlocks: [], toolDetails: [], streaming: true, id: nextMsgId() };

    setMessages(prev => [...prev, userMsg, assistantMsg]);
    setStreaming(true);

    await streamChat(text, sendKey, currentModel, (event) => {
      setMessages(prev => {
        const msgs = [...prev];
        const last = { ...msgs[msgs.length - 1] };

        if (event.type === 'content') {
          last.content += event.data;
        } else if (event.type === 'thinking') {
          last.thinkingBlocks = [...(last.thinkingBlocks || []), event.data];
        } else if (event.type === 'tool_hint') {
          last.toolHints = [...(last.toolHints || []), event.data];
        } else if (event.type === 'tool_start') {
          try {
            const detail = JSON.parse(event.data);
            last.toolDetails = [...(last.toolDetails || []), detail];
          } catch (_) {}
        } else if (event.type === 'tool_result') {
          try {
            const result = JSON.parse(event.data);
            const details = [...(last.toolDetails || [])];
            // Match by name (last unfinished card for this tool)
            for (let i = details.length - 1; i >= 0; i--) {
              if (details[i].name === result.name && details[i].result == null) {
                details[i] = { ...details[i], result: result.result, error: result.error };
                break;
              }
            }
            last.toolDetails = details;
          } catch (_) {}
        } else if (event.type === 'done') {
          last.content = event.data;
          last.streaming = false;
        } else if (event.type === 'error') {
          last.content = '**' + t('error') + '**: ' + event.data;
          last.streaming = false;
        }

        msgs[msgs.length - 1] = last;
        return msgs;
      });
    });

    setStreaming(false);
    loadSessions();
    loadInfo(sendKey);
    // Delayed refresh to pick up LLM-generated title (async, ~1-3s)
    setTimeout(() => loadSessions(), 3000);
  }, [activeKey, currentModel]);

  // 5.2: Regenerate last assistant response
  const regenerate = useCallback(() => {
    // Extract last user message text before modifying state
    let userText = null;
    setMessages(prev => {
      if (prev.length < 2) return prev;
      let lastUserIdx = -1;
      for (let i = prev.length - 1; i >= 0; i--) {
        if (prev[i].role === 'user') { lastUserIdx = i; break; }
      }
      if (lastUserIdx < 0) return prev;
      userText = prev[lastUserIdx].content;
      return prev.slice(0, lastUserIdx + 1);
    });
    // Send outside of setState to avoid side effects in updater
    if (userText) requestAnimationFrame(() => sendMessage(userText));
  }, [sendMessage]);

  // 5.2: Edit user message and resend (truncate messages after it)
  const editResend = useCallback((newText) => {
    setMessages(prev => prev.length >= 2 ? prev.slice(0, -2) : []);
    requestAnimationFrame(() => sendMessage(newText));
  }, [sendMessage]);

  // 5.3: Rename session title
  const renameSession = useCallback(async (key, title) => {
    try {
      await api('/api/sessions/' + encodeURIComponent(key), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title }),
      });
      loadSessions();
    } catch (_) {}
  }, []);

  const newChat = useCallback(() => {
    const id = Date.now().toString(36);
    const key = 'webui:' + id;
    setActiveKey(key);
    setMessages([]);
    setSessionUsage(null);
    setSessionSystemPrompt('');
    // Optimistic insert — show immediately in sidebar
    setSessions(prev => [{ key, title: t('empty_title'), created_at: new Date().toISOString(), updated_at: new Date().toISOString() }, ...prev]);
    setSidebarOpen(false);
    setTimeout(() => document.querySelector('.input-field')?.focus(), 100);
  }, []);

  const selectSession = useCallback((key) => {
    setActiveKey(key);
    setMessages([]);
    setSessionSystemPrompt('');
    setSidebarOpen(false);
    loadSessionMessages(key);
    loadInfo(key);
    // 5.1: Restore per-session model from session list metadata
    const sess = sessions.find(s => s.key === key);
    if (sess?.model) setCurrentModel(sess.model);
    setTimeout(() => document.querySelector('.input-field')?.focus(), 100);
  }, [sessions]);

  const deleteSession = useCallback((key) => {
    setConfirmDelete(key);
  }, []);

  const confirmDeleteSession = useCallback(async () => {
    if (!confirmDelete) return;
    await api('/api/sessions/' + encodeURIComponent(confirmDelete), { method: 'DELETE' });
    if (confirmDelete === activeKey) { newChat(); }
    setConfirmDelete(null);
    loadSessions();
  }, [confirmDelete, activeKey]);

  const logout = useCallback(async () => {
    await api('/api/auth', { method: 'DELETE' });
    setAuthed(false);
    setMessages([]);
    setSessions([]);
    setSessionSystemPrompt('');
  }, []);

  if (!authed) {
    return html`<${LoginScreen} onLogin=${() => setAuthed(true)} />`;
  }

  return html`
    <div class="app">
      <div class="sidebar-overlay ${sidebarOpen ? 'open' : ''}" onClick=${() => setSidebarOpen(false)} />
      <${Sidebar}
        sessions=${sessions} activeKey=${activeKey}
        onSelect=${selectSession} onNew=${newChat} onDelete=${deleteSession}
        onRename=${renameSession}
        lang=${lang} onLangChange=${toggleLang}
        usage=${sessionUsage} version=${appVersion}
        open=${sidebarOpen}
        activeTab=${activeTab} onTabChange=${setActiveTab}
        activitySessions=${activitySessions}
        selectedActivitySession=${selectedActivitySession}
        onSelectActivitySession=${setSelectedActivitySession}
        wsConnected=${wsConnected}
        unreadCount=${unreadCount} />
      <div class="main">
        <${TopBar}
          model=${currentModel} models=${models}
          streaming=${streaming} onLogout=${logout}
          onModelSelect=${(id) => { setCurrentModel(id); }}
          onMenuToggle=${() => setSidebarOpen(s => !s)} />
        ${activeTab === 'chat' ? html`
          <${SessionSystemPromptBar} value=${sessionSystemPrompt}
            sessionKey=${activeKey}
            onSave=${(v) => setSessionSystemPrompt(v)} />
          <${ChatArea} messages=${messages} streaming=${streaming}
            onRegenerate=${regenerate} onEditResend=${editResend}
            showThinking=${showThinking} showTools=${showTools} />
          <${InputArea} onSend=${sendMessage} disabled=${streaming} />
        ` : activeTab === 'activity' ? html`
          <${ActivityPanel}
            connected=${wsConnected}
            events=${wsEvents}
            activitySessions=${activitySessions}
            selectedSession=${selectedActivitySession}
            onSelectSession=${setSelectedActivitySession} />
        ` : activeTab === 'conductor' ? html`
          <${ConductorPanel} agents=${conductorAgents} plans=${conductorPlans} />
        ` : activeTab === 'settings' ? html`
          <${SettingsPanel} />
        ` : ''}
      </div>
      ${confirmDelete && html`<${ConfirmDialog}
        message=${t('delete_confirm')}
        onConfirm=${confirmDeleteSession}
        onCancel=${() => setConfirmDelete(null)} />`}
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
